services:
  mongo:
    image: mongo:6
    container_name: event_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: event_backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      MONGO_URL: mongodb://mongo:27017
      FRONTEND_URL: http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: event_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://localhost:8001
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  mongo_data:
