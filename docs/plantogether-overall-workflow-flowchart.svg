<svg width="1600" height="1400" viewBox="0 0 1600 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F8FC"/>
      <stop offset="1" stop-color="#EAF0F7"/>
    </linearGradient>
    <linearGradient id="hero" x1="80" y1="48" x2="1520" y2="176" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12314F"/>
      <stop offset="1" stop-color="#205D8E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#718096" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#5B7086"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#2C7BE5"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#2FA36B"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#D85C5C"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #D8E4F0; }
      .section { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #607284; letter-spacing: 0.14em; text-transform: uppercase; }
      .nodeTitle { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #17324B; }
      .nodeText { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #62768A; }
      .nodeStrong { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #35516B; }
      .chip { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .label {
        font: 600 12px 'Segoe UI', Arial, sans-serif;
        fill: #486076;
        stroke: #F5F8FC;
        stroke-width: 8;
        paint-order: stroke fill;
        stroke-linejoin: round;
      }
      .yesno { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #3E556B; }
    </style>
  </defs>

  <rect width="1600" height="1400" rx="28" fill="url(#bg)"/>
  <rect x="28" y="28" width="1544" height="1344" rx="24" fill="#FFFFFF" stroke="#D8E1EA" stroke-width="2"/>

  <rect x="80" y="48" width="1440" height="126" rx="28" fill="url(#hero)"/>
  <text x="122" y="102" class="title">PlanTogether Overall System Workflow</text>
  <text x="122" y="136" class="subtitle">High-level flowchart for user access, frontend interactions, backend processing, JWT protection, MongoDB operations, event actions, and error handling.</text>

  <text x="98" y="226" class="section">Entry and Access Flow</text>

  <rect x="678" y="238" width="244" height="74" rx="37" fill="#EAF3FF" stroke="#9EC3F4" filter="url(#shadow)"/>
  <text x="800" y="283" text-anchor="middle" class="nodeTitle">User Opens App</text>

  <path d="M800 312V362" stroke="#5B7086" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowSlate)"/>

  <rect x="585" y="382" width="430" height="106" rx="24" fill="#F4F8FC" stroke="#CBD9E6" filter="url(#shadow)"/>
  <text x="617" y="426" class="nodeTitle">Frontend Loads React + Vite App</text>
  <text x="617" y="454" class="nodeText">Initialize routes, contexts, stored session, and initial event view.</text>

  <path d="M800 488V538" stroke="#5B7086" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowSlate)"/>

  <polygon points="800,538 940,636 800,734 660,636" fill="#FFF8EA" stroke="#E4C387" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="622" text-anchor="middle" class="nodeTitle">Authenticated?</text>
  <text x="800" y="650" text-anchor="middle" class="nodeText">Valid JWT token present and accepted</text>

  <text x="956" y="624" class="yesno">Yes</text>
  <text x="598" y="624" class="yesno">No</text>

  <path d="M660 636H346" stroke="#2C7BE5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="438" y="618" class="label">Public access</text>

  <rect x="96" y="564" width="250" height="144" rx="24" fill="#EEF6FF" stroke="#B8D5FB" filter="url(#shadow)"/>
  <text x="126" y="608" class="nodeTitle">Public User Flow</text>
  <text x="126" y="636" class="nodeText">Browse events, search, filter,</text>
  <text x="126" y="660" class="nodeText">view event details, open login/register.</text>

  <path d="M940 636H1254" stroke="#2FA36B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="1028" y="618" class="label">Private access</text>

  <rect x="1254" y="564" width="250" height="144" rx="24" fill="#EEF9F2" stroke="#BFE2CB" filter="url(#shadow)"/>
  <text x="1284" y="608" class="nodeTitle">Authenticated Flow</text>
  <text x="1284" y="636" class="nodeText">Enable profile, create/edit event,</text>
  <text x="1284" y="660" class="nodeText">register, save, and comment actions.</text>

  <text x="98" y="806" class="section">Request / Response System Flow</text>

  <rect x="86" y="842" width="234" height="168" rx="26" fill="#F3F0FF" stroke="#C5B7F0" filter="url(#shadow)"/>
  <text x="116" y="888" class="nodeTitle">User Actions</text>
  <text x="116" y="918" class="nodeText">Login</text>
  <text x="116" y="942" class="nodeText">Register</text>
  <text x="116" y="966" class="nodeText">Browse Events</text>
  <text x="116" y="990" class="nodeText">Create / Register / Save / Comment</text>

  <rect x="392" y="842" width="282" height="168" rx="26" fill="#EEF6FF" stroke="#B8D5FB" filter="url(#shadow)"/>
  <text x="422" y="888" class="nodeTitle">Frontend Request Layer</text>
  <text x="422" y="918" class="nodeText">Forms and pages collect user input.</text>
  <text x="422" y="942" class="nodeText">Axios sends API requests.</text>
  <text x="422" y="966" class="nodeText">JWT token added to Authorization header</text>
  <text x="422" y="990" class="nodeText">for protected operations.</text>

  <rect x="754" y="842" width="314" height="168" rx="26" fill="#FFF8EA" stroke="#E4C387" filter="url(#shadow)"/>
  <text x="784" y="888" class="nodeTitle">Backend API Layer</text>
  <text x="784" y="918" class="nodeText">Express routes receive requests.</text>
  <text x="784" y="942" class="nodeText">Validation, auth checks, and business</text>
  <text x="784" y="966" class="nodeText">rules are applied to each operation.</text>

  <rect x="1148" y="842" width="232" height="168" rx="26" fill="#EEF9F2" stroke="#BFE2CB" filter="url(#shadow)"/>
  <text x="1178" y="888" class="nodeTitle">JWT Auth</text>
  <text x="1178" y="918" class="nodeText">Issue token on login.</text>
  <text x="1178" y="942" class="nodeText">Verify token for protected routes.</text>
  <text x="1178" y="966" class="nodeText">Reject invalid or expired tokens.</text>

  <rect x="1434" y="842" width="110" height="168" rx="26" fill="#F4FAF0" stroke="#CDE2BB" filter="url(#shadow)"/>
  <text x="1489" y="888" text-anchor="middle" class="nodeTitle">DB</text>
  <text x="1489" y="918" text-anchor="middle" class="nodeText">MongoDB</text>
  <text x="1489" y="948" text-anchor="middle" class="nodeText">Read / Write</text>

  <path d="M320 926H392" stroke="#5B7086" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
  <text x="334" y="906" class="label">UI action</text>

  <path d="M674 926H754" stroke="#2C7BE5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="694" y="906" class="label">API request</text>

  <path d="M1068 896H1148" stroke="#5B7086" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
  <text x="1088" y="876" class="label">verify token</text>

  <path d="M1148 956H1068" stroke="#2FA36B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="1082" y="978" class="label">auth result</text>

  <path d="M1068 926H1434" stroke="#5B7086" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
  <text x="1202" y="906" class="label">query / persist</text>

  <path d="M1434 974H1068" stroke="#2FA36B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="1208" y="996" class="label">records / write result</text>

  <path d="M754 974H674" stroke="#2C7BE5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="684" y="996" class="label">JSON response</text>

  <path d="M392 974H320" stroke="#2FA36B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="326" y="996" class="label">UI update</text>

  <text x="98" y="1088" class="section">Protected Routes and Error Handling</text>

  <rect x="92" y="1124" width="394" height="180" rx="26" fill="#F4F8FC" stroke="#CBD9E6" filter="url(#shadow)"/>
  <text x="122" y="1170" class="nodeTitle">Protected Route Check</text>
  <text x="122" y="1200" class="nodeText">Frontend checks whether the user is authenticated</text>
  <text x="122" y="1224" class="nodeText">before allowing access to create, edit, and profile pages.</text>
  <text x="122" y="1256" class="nodeStrong">If not authenticated:</text>
  <text x="122" y="1280" class="nodeText">redirect to login page.</text>

  <rect x="566" y="1124" width="434" height="180" rx="26" fill="#FFF8EA" stroke="#E4C387" filter="url(#shadow)"/>
  <text x="596" y="1170" class="nodeTitle">Business Logic Processing</text>
  <text x="596" y="1200" class="nodeText">Backend validates input and applies rules such as:</text>
  <text x="596" y="1224" class="nodeText">future event date, ownership checks, duplicate registration,</text>
  <text x="596" y="1248" class="nodeText">capacity limits, bookmark rules, and comment permissions.</text>

  <rect x="1080" y="1124" width="430" height="180" rx="26" fill="#FFF4F4" stroke="#E6B5B5" filter="url(#shadow)"/>
  <text x="1110" y="1170" class="nodeTitle">Error Flow</text>
  <text x="1110" y="1200" class="nodeText">If token is invalid, expired, or the request fails validation,</text>
  <text x="1110" y="1224" class="nodeText">backend returns an error JSON response.</text>
  <text x="1110" y="1256" class="nodeStrong">Frontend reaction:</text>
  <text x="1110" y="1280" class="nodeText">show message, clear bad session, redirect to login when needed.</text>

  <path d="M486 1214H566" stroke="#5B7086" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
  <text x="504" y="1194" class="label">allowed request</text>

  <path d="M1000 1214H1080" stroke="#D85C5C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowRed)"/>
  <text x="1018" y="1194" class="label">auth / validation failure</text>

  <path d="M1080 1276H486" stroke="#D85C5C" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrowRed)"/>
  <text x="724" y="1298" class="label">redirect to login or show action error</text>
</svg>
