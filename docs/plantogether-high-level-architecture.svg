<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1460" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10141B"/>
      <stop offset="1" stop-color="#161D27"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1A232F"/>
      <stop offset="1" stop-color="#111923"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF9A3C"/>
      <stop offset="1" stop-color="#FF6B2C"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#49C4FF"/>
      <stop offset="1" stop-color="#208AE6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#FF8A36"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#3DB5FF"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #F7F8FA; }
      .subtitle { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #9DA9B8; }
      .zone { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #F7F8FA; }
      .zoneSmall { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #C9D3DE; letter-spacing: 0.12em; text-transform: uppercase; }
      .cardTitle { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #F7F8FA; }
      .cardText { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #B7C2CF; }
      .cardTextStrong { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #E7EDF5; }
      .pill { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .tiny { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #A7B3C0; }
      .mono { font: 600 11px Consolas, 'Courier New', monospace; fill: #FFD5B1; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" rx="28" fill="url(#bg)"/>
  <rect x="34" y="34" width="1532" height="912" rx="26" stroke="#253243" stroke-width="2"/>

  <text x="72" y="90" class="title">PlanTogether - High-Level Architecture</text>
  <text x="72" y="122" class="subtitle">Current project snapshot based on the React/Vite frontend, Express API, MongoDB persistence, JWT auth, and Docker Compose runtime in this repository.</text>

  <rect x="72" y="162" width="220" height="376" rx="24" fill="url(#panel)" stroke="#2A394A" filter="url(#shadow)"/>
  <text x="100" y="205" class="zoneSmall">Clients</text>
  <text x="100" y="238" class="zone">Users + Browser</text>
  <rect x="100" y="266" width="164" height="52" rx="16" fill="#162231" stroke="#35506A"/>
  <text x="120" y="297" class="cardTitle">React SPA</text>
  <text x="120" y="316" class="cardText">Runs in browser on port 5173</text>
  <rect x="100" y="332" width="164" height="56" rx="14" fill="#13202B" stroke="#314658"/>
  <text x="120" y="356" class="cardTextStrong">Home / Explore / Details</text>
  <text x="120" y="378" class="cardTextStrong">Profile</text>
  <text x="100" y="416" class="cardText">Primary interaction paths</text>
  <text x="100" y="442" class="cardText">- browse upcoming events</text>
  <text x="100" y="466" class="cardText">- authenticate and persist session</text>
  <text x="100" y="490" class="cardText">- create, edit, register, save,</text>
  <text x="100" y="514" class="cardText">  comment</text>

  <rect x="330" y="162" width="470" height="560" rx="28" fill="url(#panel)" stroke="#314658" filter="url(#shadow)"/>
  <rect x="330" y="162" width="470" height="14" rx="7" fill="url(#blue)"/>
  <text x="362" y="205" class="zoneSmall">Frontend Layer</text>
  <text x="362" y="238" class="zone">React + Vite Application</text>
  <text x="362" y="264" class="subtitle">`frontend/src`</text>

  <rect x="362" y="292" width="196" height="118" rx="18" fill="#182534" stroke="#36536C"/>
  <text x="384" y="324" class="cardTitle">Routing + Pages</text>
  <text x="384" y="350" class="cardText">React Router drives:</text>
  <text x="384" y="374" class="cardText">Home, Explore, Login, Register,</text>
  <text x="384" y="398" class="cardText">Event Details, Create/Edit, Profile</text>

  <rect x="574" y="292" width="194" height="140" rx="18" fill="#182534" stroke="#36536C"/>
  <text x="596" y="324" class="cardTitle">Global State</text>
  <text x="596" y="350" class="cardTextStrong">AuthContext</text>
  <text x="596" y="372" class="cardText">register, login, verify, logout</text>
  <text x="596" y="398" class="cardTextStrong">EventContext</text>
  <text x="596" y="420" class="cardText">fetch, mutate, sync event collections</text>

  <rect x="362" y="434" width="196" height="144" rx="18" fill="#182534" stroke="#36536C"/>
  <text x="384" y="466" class="cardTitle">API Access</text>
  <text x="384" y="492" class="cardTextStrong">Axios Client</text>
  <text x="384" y="516" class="cardText">Base URL from `VITE_BACKEND_URL`</text>
  <text x="384" y="540" class="cardText">Request interceptor adds</text>
  <text x="384" y="564" class="mono">Authorization: Bearer &lt;jwt&gt;</text>

  <rect x="574" y="434" width="194" height="144" rx="18" fill="#182534" stroke="#36536C"/>
  <text x="596" y="466" class="cardTitle">Session Storage</text>
  <text x="596" y="492" class="cardTextStrong">localStorage</text>
  <text x="596" y="516" class="mono">plantogether_token</text>
  <text x="596" y="540" class="mono">plantogether_user</text>
  <text x="596" y="564" class="cardText">Session revalidated on app load</text>

  <rect x="362" y="580" width="406" height="110" rx="18" fill="#131C27" stroke="#33485C"/>
  <text x="384" y="612" class="cardTitle">UI / UX Layer</text>
  <text x="384" y="638" class="cardText">Tailwind CSS styling, reusable components, protected routes,</text>
  <text x="384" y="662" class="cardText">search + category filters, form validation feedback, share / clipboard fallback.</text>

  <rect x="844" y="162" width="454" height="560" rx="28" fill="url(#panel)" stroke="#57412E" filter="url(#shadow)"/>
  <rect x="844" y="162" width="454" height="14" rx="7" fill="url(#orange)"/>
  <text x="876" y="205" class="zoneSmall">Backend Layer</text>
  <text x="876" y="238" class="zone">Node.js + Express API</text>
  <text x="876" y="264" class="subtitle">`backend/src`</text>

  <rect x="876" y="292" width="188" height="122" rx="18" fill="#221B18" stroke="#6A4A37"/>
  <text x="898" y="324" class="cardTitle">HTTP Entry</text>
  <text x="898" y="350" class="cardTextStrong">server.js -&gt; app.js</text>
  <text x="898" y="374" class="cardText">CORS for frontend origin</text>
  <text x="898" y="398" class="cardText">JSON body parsing + morgan logs</text>

  <rect x="1080" y="292" width="186" height="136" rx="18" fill="#221B18" stroke="#6A4A37"/>
  <text x="1102" y="324" class="cardTitle">Route Modules</text>
  <text x="1102" y="350" class="cardTextStrong">/api/auth</text>
  <text x="1102" y="372" class="cardText">register, login, verify</text>
  <text x="1102" y="398" class="cardTextStrong">/api/events</text>
  <text x="1102" y="420" class="cardText">CRUD, register, bookmark, comments</text>

  <rect x="876" y="438" width="188" height="122" rx="18" fill="#221B18" stroke="#6A4A37"/>
  <text x="898" y="470" class="cardTitle">Cross-Cutting Logic</text>
  <text x="898" y="496" class="cardTextStrong">Auth middleware</text>
  <text x="898" y="520" class="cardText">`requireAuth` / `optionalAuth`</text>
  <text x="898" y="544" class="cardText">error handler + async wrapper</text>

  <rect x="1080" y="438" width="186" height="122" rx="18" fill="#221B18" stroke="#6A4A37"/>
  <text x="1102" y="470" class="cardTitle">Security + Rules</text>
  <text x="1102" y="496" class="cardText">JWT issue / verify</text>
  <text x="1102" y="520" class="cardText">bcrypt password hashing</text>
  <text x="1102" y="544" class="cardText">ownership, future-date, capacity checks</text>

  <rect x="876" y="584" width="390" height="106" rx="18" fill="#17130F" stroke="#674B36"/>
  <text x="898" y="616" class="cardTitle">Domain Behavior Exposed by API</text>
  <text x="898" y="642" class="cardText">Search and category filtering, created/registered/bookmarked event views,</text>
  <text x="898" y="666" class="cardText">host-only attendee visibility, comment moderation by author or event owner.</text>

  <rect x="1328" y="162" width="200" height="300" rx="28" fill="url(#panel)" stroke="#36553C" filter="url(#shadow)"/>
  <text x="1360" y="205" class="zoneSmall">Data Layer</text>
  <text x="1360" y="238" class="zone">MongoDB</text>
  <text x="1360" y="264" class="subtitle">Mongoose connection + models</text>
  <rect x="1360" y="292" width="136" height="80" rx="16" fill="#16281C" stroke="#3E6A49"/>
  <text x="1382" y="323" class="cardTitle">User</text>
  <text x="1382" y="342" class="cardText">name, email</text>
  <text x="1382" y="360" class="cardText">password hash</text>
  <rect x="1360" y="376" width="136" height="86" rx="16" fill="#16281C" stroke="#3E6A49"/>
  <text x="1382" y="392" class="cardTitle">Event</text>
  <text x="1382" y="410" class="cardText">event metadata</text>
  <text x="1382" y="428" class="cardText">registrations[]</text>
  <text x="1382" y="446" class="cardText">bookmarks + comments</text>

  <rect x="1328" y="462" width="200" height="260" rx="28" fill="url(#panel)" stroke="#4A4566" filter="url(#shadow)"/>
  <text x="1360" y="505" class="zoneSmall">Runtime</text>
  <text x="1360" y="538" class="zone">Docker Compose</text>
  <rect x="1360" y="570" width="136" height="42" rx="14" fill="#1D1A31" stroke="#605A8B"/>
  <text x="1384" y="596" class="pill">frontend :5173</text>
  <rect x="1360" y="624" width="136" height="42" rx="14" fill="#1D1A31" stroke="#605A8B"/>
  <text x="1386" y="650" class="pill">backend :8001</text>
  <rect x="1360" y="678" width="136" height="42" rx="14" fill="#1D1A31" stroke="#605A8B"/>
  <text x="1392" y="704" class="pill">mongo :27017</text>

  <rect x="72" y="760" width="1456" height="142" rx="28" fill="#111821" stroke="#263546" filter="url(#shadow)"/>
  <text x="104" y="803" class="zoneSmall">Core Product Capabilities</text>
  <text x="104" y="836" class="zone">Business Flows Implemented Across Frontend + Backend</text>

  <rect x="104" y="854" width="154" height="30" rx="15" fill="#2A1D13" stroke="#A6632B"/>
  <text x="126" y="873" class="pill">JWT Authentication</text>
  <rect x="270" y="854" width="154" height="30" rx="15" fill="#172230" stroke="#4376A7"/>
  <text x="294" y="873" class="pill">Event CRUD</text>
  <rect x="436" y="854" width="170" height="30" rx="15" fill="#172230" stroke="#4376A7"/>
  <text x="455" y="873" class="pill">Search + Filters</text>
  <rect x="618" y="854" width="184" height="30" rx="15" fill="#172A20" stroke="#4D8D63"/>
  <text x="639" y="873" class="pill">Registration + Capacity</text>
  <rect x="814" y="854" width="144" height="30" rx="15" fill="#201A2D" stroke="#786BB0"/>
  <text x="846" y="873" class="pill">Bookmarks</text>
  <rect x="970" y="854" width="132" height="30" rx="15" fill="#201A2D" stroke="#786BB0"/>
  <text x="1008" y="873" class="pill">Comments</text>
  <rect x="1114" y="854" width="148" height="30" rx="15" fill="#172230" stroke="#4376A7"/>
  <text x="1152" y="873" class="pill">Profile Views</text>

  <path d="M292 278H330" stroke="#3DB5FF" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M800 486H844" stroke="#FF8A36" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
  <path d="M1298 350H1328" stroke="#FF8A36" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
  <path d="M1298 610H1328" stroke="#FF8A36" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
  <path d="M668 556V620H876" stroke="#64748B" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowOrange)"/>
  <path d="M668 492V434" stroke="#64748B" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowBlue)"/>
  <path d="M1430 492V462" stroke="#5E7F63" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="486" y="112" width="168" height="30" rx="15" fill="#122536" stroke="#2E5C82"/>
  <text x="511" y="131" class="pill">HTTP / JSON over Axios</text>
  <rect x="1022" y="112" width="162" height="30" rx="15" fill="#2B1B10" stroke="#9C5B28"/>
  <text x="1060" y="131" class="pill">JWT + Validation</text>
  <rect x="1332" y="112" width="146" height="30" rx="15" fill="#15261B" stroke="#4E8460"/>
  <text x="1363" y="131" class="pill">Mongoose ODM</text>

  <text x="78" y="934" class="tiny">Generated from current repo structure: `frontend/`, `backend/`, `docker-compose.yml`, AuthContext/EventContext, Express auth/events routes, Mongoose User/Event models.</text>
</svg>
